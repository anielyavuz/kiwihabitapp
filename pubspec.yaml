name: kiwihabitapp
description: A new Flutter project.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 2.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0

  cupertino_icons: ^1.0.8

  google_fonts: ^6.2.1
  firebase_auth: ^5.3.0
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  lottie: ^3.1.2
  flutter_launcher_icons: ^0.13.1
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^5.0.0
  rxdart: ^0.28.0
  package_info_plus: ^8.1.1
  google_nav_bar: ^5.0.6
  google_sign_in: ^6.2.1
  collection: ^1.18.0
  just_audio: ^0.9.40
  sign_in_with_apple: ^6.1.4
  badges: ^3.1.2


dependency_overrides:
  intl: ^0.20.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  # hive_generator: ^2.0.0
  # build_runner: ^2.4.0
  flutter_lints: ^4.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/voltAppIcon.png"

flutter:

  generate: true
  uses-material-design: true

  assets:
    - assets/json/loading.json
    - assets/json/check.json
    - assets/icon/voltAppIcon.png
    - assets/images/kiwiLogo.png
    - assets/images/kapak.jpg
    - assets/images/Google.png
    - assets/images/Apple.png
    - assets/json/exercise.json
    - assets/json/yoga.json
    - assets/json/sleep.json
    - assets/json/read.json
    - assets/json/work.json
    - assets/audio/tik.mp3
    - assets/audio/check.mp3
    - assets/audio/uncheck.mp3
    - assets/audio/popUp.mp3
    - assets/audio/baloncuk.mp3
